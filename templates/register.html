<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - FurniNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --cream: #F5F0E8;
            --warm-white: #FAF7F2;
            --brown: #5C3D2E;
            --brown-light: #8B6352;
            --gold: #C6A15B;
            --gold-dark: #A27C3E;
            --text-dark: #3A2C1F;
            --text-light: #7A6B5D;
            --border-light: #E8DFD5;
            --shadow: 0 20px 40px rgba(0,0,0,0.05);
            --shadow-hover: 0 30px 50px rgba(0,0,0,0.1);
            --error-red: #dc2626;
            --error-bg: rgba(220, 38, 38, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Auth Container */
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--brown);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .tagline {
            color: var(--text-light);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .auth-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--brown);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brown);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--warm-white);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198, 161, 91, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-light);
            font-size: 13px;
        }

        /* Button */
        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--brown);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register:hover {
            background: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(198, 161, 91, 0.2);
        }

        /* Error Message */
        .error-msg {
            background: var(--error-bg);
            color: var(--error-red);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: left;
            border-left: 3px solid var(--error-red);
        }

        /* Auth Link */
        .auth-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
            color: var(--text-light);
            font-size: 14px;
        }

        .auth-link a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-link a:hover {
            color: var(--gold);
        }

        /* Footer note */
        .footer-note {
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-light);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .auth-container {
                padding: 32px 24px;
            }
            .logo {
                font-size: 28px;
            }
            .auth-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">FurniNest</div>
        <div class="tagline">Premium Furniture</div>
        <h1>📝 Daftar Akun</h1>

        <div th:if="${error}" class="error-msg" th:text="${error}">
            <i class="fas fa-exclamation-circle"></i> Pesan error akan muncul di sini
        </div>
        
        <form method="post" action="/register">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="margin-right: 6px;"></i> Email</label>
                <input type="email" name="email" required placeholder="contoh@email.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right: 6px;"></i> Password</label>
                <input type="password" name="password" required placeholder="Minimal 6 karakter">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right: 6px;"></i> Nama Lengkap</label>
                <input type="text" name="fullName" required placeholder="Nama lengkap kamu">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone" style="margin-right: 6px;"></i> Nomor HP</label>
                <input type="tel" name="phone" placeholder="08123456789">
            </div>
            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Daftar Sekarang
            </button>
        </form>
        
        <div class="auth-link">
            Sudah punya akun? <a href="/">Login disini</a>
        </div>
        
        <div class="footer-note">
            Dengan mendaftar, Anda menyetujui <a href="#" style="color: var(--gold-dark);">Syarat & Ketentuan</a> dan <a href="#" style="color: var(--gold-dark);">Kebijakan Privasi</a> FurniNest.
        </div>
    </div>
</body>
</html>
